name: YouTube Comment Analyzer CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install Dependencies
      run: |
        pip install fastapi
        pip install uvicorn
        pip install pandas
        pip install numpy
        pip install scikit-learn

    - name: Verify Imports
      run: |
        python -c "import fastapi"
        python -c "import pandas"
        python -c "import sklearn"

    - name: Success Message
      run: |
        echo "GitHub Actions CI Passed Successfully!"