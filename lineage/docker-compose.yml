version: "3.8"

services:

  postgres:
    image: postgres:14

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marquez

    ports:
      - "5432:5432"

  marquez:
    image: marquezproject/marquez:latest

    ports:
      - "3001:3000"

    depends_on:
      - postgres